<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>404 - Emerald Circus</title>
     <link rel="icon" href="images/logo.jpeg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* CRITICAL: NO SCROLLING - fixed viewport height, overflow hidden */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            background: linear-gradient(145deg, #fef9e6 0%, #fff4e0 100%);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* playful background shapes (non-scrollable, fixed) */
        .bg-bubbles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            background: rgba(255, 214, 10, 0.2);
            border-radius: 50%;
            animation: float 12s infinite ease-in-out;
        }

        .bubble:nth-child(1) { width: 120px; height: 120px; top: 10%; left: -30px; animation-duration: 18s; background: rgba(16, 185, 129, 0.1);}
        .bubble:nth-child(2) { width: 200px; height: 200px; bottom: 5%; right: -60px; animation-duration: 22s; background: rgba(255, 214, 10, 0.15);}
        .bubble:nth-child(3) { width: 80px; height: 80px; top: 60%; left: 15%; animation-duration: 14s; background: rgba(16, 185, 129, 0.2);}
        .bubble:nth-child(4) { width: 150px; height: 150px; top: 20%; right: 10%; animation-duration: 20s; background: rgba(255, 214, 10, 0.12);}
        .bubble:nth-child(5) { width: 90px; height: 90px; bottom: 25%; left: 20%; animation-duration: 16s; background: #10B98110;}
        .bubble:nth-child(6) { width: 260px; height: 260px; bottom: -80px; left: -70px; animation-duration: 25s; background: #FFD60A08;}

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* main card container — perfectly centered, no outer scroll */
        .circus-404 {
            max-width: 780px;
            width: 90%;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(4px);
            border-radius: 72px 48px 72px 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 8px 18px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255,255,255,0.8);
            padding: 1.8rem 1.8rem 2rem;
            text-align: center;
            position: relative;
            z-index: 2;
            transition: all 0.2s ease;
            border: 2px solid #FFD60A60;
            margin: auto;
            /* prevent internal scrolling unless absolutely necessary (tiny screens) */
            overflow-y: auto;
            max-height: 98vh;
        }

        /* hide scrollbar on card for cleaner look, but keep functionality */
        .circus-404::-webkit-scrollbar {
            width: 4px;
            background: transparent;
        }
        .circus-404::-webkit-scrollbar-thumb {
            background: #FFD60A80;
            border-radius: 10px;
        }

        /* clown hat accent */
        .clown-hat {
            margin-bottom: 0.8rem;
            position: relative;
            display: inline-block;
        }

        .clown-hat i {
            font-size: 4rem;
            filter: drop-shadow(2px 6px 12px rgba(0,0,0,0.15));
        }

        .big-404 {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #10B981 20%, #FFD60A 70%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin: 0.2rem 0 0.3rem;
            text-shadow: 6px 6px 0 rgba(16, 185, 129, 0.12);
        }

        .title-message {
            font-size: 1.7rem;
            font-weight: 700;
            color: #1f2a3e;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .title-message span {
            background: #FFF1c1;
            padding: 0.2rem 0.9rem;
            border-radius: 100px;
            font-size: 1.3rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .sub-message {
            color: #2c3e4e;
            font-size: 1rem;
            max-width: 500px;
            margin: 0.8rem auto 1rem;
            background: #fef7e0;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            display: inline-block;
            box-shadow: inset 0 1px 3px #0001, 0 2px 4px #ffe6a3;
        }

        .juggling-options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin: 1.4rem 0 1.2rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.75rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            text-decoration: none;
            background: white;
            border: 2px solid #e2e8f0;
            color: #1e293b;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
            cursor: pointer;
        }

        /* PRIMARY HOME BUTTON - stands out with #10B981 */
        .btn-home {
            background: #10B981;
            border-color: #10B981;
            color: white;
            box-shadow: 0 8px 18px -6px #10B98190;
        }

        .btn-home:hover {
            background: #0e9f6e;
            transform: translateY(-3px);
            border-color: #0e9f6e;
            box-shadow: 0 12px 22px -8px #10B981b3;
        }

        .btn-secondary {
            background: #FFD60A;
            border-color: #FFD60A;
            color: #2c2b1f;
            box-shadow: 0 6px 14px -5px #FFD60A80;
        }

        .btn-secondary:hover {
            background: #e5c109;
            transform: translateY(-2px);
            border-color: #e5c109;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #10B981;
            color: #10B981;
        }

        .btn-outline:hover {
            background: #10B98110;
            transform: translateY(-2px);
        }

        /* performer strip */
        .performer-strip {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 1.2rem 0 0.8rem;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: #4b5563;
            background: #fff7e5;
            padding: 0.6rem 1rem;
            border-radius: 80px;
            align-items: center;
        }

        .performer-strip i {
            font-size: 1rem;
            color: #FFD60A;
        }

        .performer-strip span {
            font-weight: 500;
        }

        footer {
            margin-top: 1.2rem;
            font-size: 0.7rem;
            color: #94a3b8;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        footer a {
            color: #10B981;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        footer a:hover {
            text-decoration: underline;
            color: #FFD60A;
        }

        /* wiggle animation */
        .wiggle {
            display: inline-block;
            animation: gentleWiggle 2s infinite ease;
        }

        @keyframes gentleWiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(6deg); }
            75% { transform: rotate(-4deg); }
        }

        /* For very small screens, ensure everything fits without vertical scroll */
        @media (max-height: 650px) {
            .circus-404 {
                padding: 1rem 1.5rem 1.2rem;
            }
            .big-404 {
                font-size: 6rem;
            }
            .title-message {
                font-size: 1.3rem;
                margin-bottom: 0.2rem;
            }
            .sub-message {
                margin: 0.4rem auto 0.7rem;
                font-size: 0.9rem;
            }
            .juggling-options {
                margin: 0.8rem 0 0.6rem;
                gap: 0.8rem;
            }
            .btn {
                padding: 0.5rem 1.3rem;
                font-size: 0.85rem;
            }
            .performer-strip {
                margin: 0.6rem 0 0.4rem;
                padding: 0.4rem 0.8rem;
                font-size: 0.75rem;
            }
            footer {
                margin-top: 0.7rem;
            }
        }

        @media (max-width: 560px) {
            .circus-404 {
                padding: 1.2rem 1.2rem 1.5rem;
                width: 92%;
            }
            .big-404 {
                font-size: 6.2rem;
            }
            .title-message {
                font-size: 1.3rem;
            }
        }

        .btn:focus-visible, footer a:focus-visible {
            outline: 2px solid #10B981;
            outline-offset: 2px;
        }

        .clown-hat {
            cursor: pointer;
        }
    </style>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="bg-bubbles">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
</div>

<div class="circus-404">
    <div class="clown-hat" id="clownNoseTrigger">
        <i class="fa-regular fa-face-grin-tongue-squint wiggle" style="font-size: 4.5rem; color: #FFD60A;"></i>
        <i class="fa-solid fa-circle" style="font-size: 1.1rem; color: #EF4444; position: absolute; top: 12px; right: -6px; opacity: 0.9;"></i>
    </div>

    <div class="big-404">
        4<span style="color:#10B981;">0</span>4
    </div>

    <div class="title-message">
        🤡 <span><i class="fa-regular fa-face-smile-wink"></i> Tumbling Tumbleweeds! <i class="fa-regular fa-face-surprise"></i></span> 🎪
    </div>

    <div class="sub-message">
        <i class="fa-regular fa-compass"></i> The big top has vanished — this page escaped the ring!
    </div>

    <p style="max-width: 480px; margin: 0 auto 0.8rem; color: #334155; font-size: 0.95rem;">
        Our clumsy clown juggled too many URLs, and this performance went <strong>poof!</strong>  
        But don't worry — the circus is still in town. Let's get you back to the main tent.
    </p>

    <!-- Button group with prominent BACK TO HOME button (primary action) -->
    <div class="juggling-options">
        <a href="index.html" class="btn btn-home" id="backHomeBtn">
            <i class="fa-solid fa-house-chimney"></i> Back to Home
        </a>
    </div>

</div>
</body>
</html>
